services:
  mysql:
    image: ${DOCKER_LIBRARY_MIRROR}/mysql:8.0.39
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_APP_DB}
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    volumes:
      - ${MYSQL_DATA_DIR}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        DOCKER_LIBRARY_MIRROR: ${DOCKER_LIBRARY_MIRROR}
        APT_MIRROR_URL: ${DEBIAN_APT_MIRROR_URL}
        APT_SECURITY_MIRROR_URL: ${DEBIAN_APT_SECURITY_MIRROR_URL}
        GOPROXY: ${GOPROXY}
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ${BACKEND_ENV_FILE}
    environment:
      GIN_MODE: release
      LD_LIBRARY_PATH: /app/third_party/HCNetSDK_Linux64/Library:/app/third_party/HCNetSDK_Linux64/Library/HCNetSDKCom
    volumes:
      - ${BACKEND_ENV_FILE}:/app/.env:ro
      - ${MEDIA_DIR}:/app/media
    ports:
      - 127.0.0.1:${BACKEND_PORT}:8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        DOCKER_LIBRARY_MIRROR: ${DOCKER_LIBRARY_MIRROR}
        VITE_API_BASE_URL: /api
        NPM_REGISTRY: ${NPM_REGISTRY}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ${NGINX_CONF_FILE}:/etc/nginx/conf.d/default.conf:ro
    ports:
      - ${FRONTEND_PORT}:80
    restart: unless-stopped
