openapi: 3.0.3
info:
  title: 安全管理平台 API
  version: 0.1.0
  description: |
    根据 secmgmt_go 当前 Gin 路由整理的 OpenAPI 草案。

    说明：
    - 统一响应格式为 `{ code, message, data }`。
    - 除 `/healthz`、`/api/auth/login`、`/api/sse/alarms` 外，大部分接口需要 JWT。
    - 本文件用于 Apifox、Postman、Swagger UI 导入和联调起步；复杂 DTO 字段请结合 `api.md` 与代码继续细化。
servers:
  - url: http://127.0.0.1:8000
    description: 本地后端
  - url: http://127.0.0.1:5173
    description: 本地前端代理场景
tags:
  - name: Health
  - name: Auth
  - name: MasterData
  - name: UserRole
  - name: Device
  - name: Alarm
  - name: Dashboard
  - name: Push
  - name: Smart
  - name: Video
  - name: Export
  - name: SSE
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: 健康检查
      security: []
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginEnvelope"
        "400":
          $ref: "#/components/responses/Error"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: 当前用户信息
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/menus:
    get:
      tags: [Auth]
      summary: 当前用户菜单
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/factories:
    get:
      tags: [MasterData]
      summary: 厂区列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [MasterData]
      summary: 新增厂区
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/factories/{id}:
    put:
      tags: [MasterData]
      summary: 更新厂区
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [MasterData]
      summary: 删除厂区
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/factories/{id}/status:
    patch:
      tags: [MasterData]
      summary: 修改厂区状态
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/StatusJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/zones:
    get:
      tags: [MasterData]
      summary: 区域列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
        - name: factory_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [MasterData]
      summary: 新增区域
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/depts:
    get:
      tags: [MasterData]
      summary: 部门列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [MasterData]
      summary: 新增部门
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/dicts:
    get:
      tags: [MasterData]
      summary: 字典类型与字典项列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/users:
    get:
      tags: [UserRole]
      summary: 用户列表
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
        - name: dept_id
          in: query
          schema:
            type: integer
        - name: role_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [UserRole]
      summary: 新增用户
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/users/{id}:
    put:
      tags: [UserRole]
      summary: 更新用户
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [UserRole]
      summary: 删除用户
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/roles:
    get:
      tags: [UserRole]
      summary: 角色列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [UserRole]
      summary: 新增角色
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/roles/{id}:
    put:
      tags: [UserRole]
      summary: 更新角色
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [UserRole]
      summary: 删除角色
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/cameras:
    get:
      tags: [Device]
      summary: 摄像机列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
        - name: factory_id
          in: query
          schema:
            type: integer
        - name: zone_id
          in: query
          schema:
            type: integer
        - name: support_ai
          in: query
          schema:
            type: boolean
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Device]
      summary: 新增摄像机
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/cameras/{id}:
    get:
      tags: [Device]
      summary: 摄像机详情
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    put:
      tags: [Device]
      summary: 更新摄像机
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Device]
      summary: 删除摄像机
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/cameras/{id}/test:
    post:
      tags: [Device]
      summary: 测试摄像机连接
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/cameras/{id}/status/check:
    post:
      tags: [Device]
      summary: 检测摄像机状态
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/recorders:
    get:
      tags: [Device]
      summary: 录像机列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
        - name: factory_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Device]
      summary: 新增录像机
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/recorders/{id}/sync-channels:
    post:
      tags: [Device]
      summary: 同步录像机通道
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/channels:
    get:
      tags: [Device]
      summary: 通道列表
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
        - name: factory_id
          in: query
          schema:
            type: integer
        - name: zone_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/alarms:
    get:
      tags: [Alarm]
      summary: 告警列表
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
        - name: level
          in: query
          schema:
            type: string
        - name: alarm_type
          in: query
          schema:
            type: string
        - name: start_at
          in: query
          schema:
            type: string
            format: date-time
        - name: end_at
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/alarms/realtime:
    get:
      tags: [Alarm]
      summary: 实时告警列表
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/alarms/{id}:
    get:
      tags: [Alarm]
      summary: 告警详情
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/alarms/{id}/process:
    post:
      tags: [Alarm]
      summary: 处理告警
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: 首页汇总
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/push/configs:
    get:
      tags: [Push]
      summary: 推送配置列表
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Push]
      summary: 新增推送配置
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/push/logs:
    get:
      tags: [Push]
      summary: 推送日志
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/smart/providers:
    get:
      tags: [Smart]
      summary: 智能接口厂商列表
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - name: provider_type
          in: query
          schema:
            type: string
        - name: enabled
          in: query
          schema:
            type: boolean
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Smart]
      summary: 新增智能接口厂商
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/smart/events/ingest/{providerCode}:
    post:
      tags: [Smart]
      summary: 接入第三方智能事件
      description: 当前代码中该路由注册在 JWT 保护分组下。
      parameters:
        - name: providerCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/smart/events:
    get:
      tags: [Smart]
      summary: 智能事件列表
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - name: provider_code
          in: query
          schema:
            type: string
        - name: capability_code
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/smart/ai/callback:
    post:
      tags: [Smart]
      summary: 智能 AI 回调
      description: 当前代码中该路由注册在 JWT 保护分组下。
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/video/live/{id}:
    get:
      tags: [Video]
      summary: 摄像机实时预览地址
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: stream_type
          in: query
          schema:
            type: string
        - name: stream_profile
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/video/live/channel/{id}:
    get:
      tags: [Video]
      summary: 通道实时预览地址
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: stream_type
          in: query
          schema:
            type: string
        - name: stream_profile
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/video/snapshot:
    post:
      tags: [Video]
      summary: 抓图
      requestBody:
        $ref: "#/components/requestBodies/GenericJson"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/video/playback/search:
    get:
      tags: [Video]
      summary: 检索录像片段
      parameters:
        - name: channel_id
          in: query
          schema:
            type: integer
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/export/alarms:
    get:
      tags: [Export]
      summary: 导出告警
      responses:
        "200":
          description: 文件流

  /api/sse/alarms:
    get:
      tags: [SSE]
      summary: 实时告警 SSE
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
  requestBodies:
    GenericJson:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    StatusJson:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
            required:
              - status
  responses:
    OK:
      description: 成功
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    Error:
      description: 错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
  schemas:
    Envelope:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true
      required:
        - code
        - message
        - data
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
      required:
        - username
        - password
    LoginEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                access_token:
                  type: string
                token_type:
                  type: string
                  example: Bearer
                expires_in:
                  type: integer
